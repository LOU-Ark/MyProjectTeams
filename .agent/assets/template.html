<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Aurora Project Intelligence Portal | Final Fidelity v10.6</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>
    <div id="container">
        <div id="sidebar">
            <div class="sidebar-logo">AURORA HUB</div>
            <div class="nav-target" id="nav-target-root">
                <!-- Dynamic Navigation v10.6 -->
            </div>
            <div style="margin-top:auto; padding:20px; font-size:0.55rem; color:#444; border-top:1px solid rgba(255,255,255,0.05);">
                AURORA STANDARDS COMPLIANT<br>FULL FIDELITY SYNC ACTIVE
            </div>
        </div>
        <div id="main-wrapper">
            <div id="main-scroll"><div class="content-card"><div id="view"></div></div></div>
        </div>
    </div>
    <div id="tooltip"></div>
    <!-- 1. 共通スキャナーの読み込み -->
    <script src="scanner.js"></script>
    <script>
        // エンジン起動前の初期化用
        async function launchPortal() {
            try {
                // ステップ1：スキャン実行
                await runAutoScan();
                
                // ステップ2：エンジンのロード
                const script = document.createElement('script');
                script.src = 'engine.js';
                script.onload = () => {
                    const foundIds = Object.keys(window.projectDocs);
                    if (foundIds.length > 0) {
                        renderSidebar(); 
                        const defaultId = foundIds.find(id => id.includes('Master_Report')) || foundIds[0];
                        switchDoc(defaultId);
                    } else {
                        console.error("No documents detected.");
                    }
                };
                document.body.appendChild(script);
            } catch (e) {
                console.error("Launch failed: ", e);
            }
        }

        launchPortal();
    </script>
</body>
</html>
