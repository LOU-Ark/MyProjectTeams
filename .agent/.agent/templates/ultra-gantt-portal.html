<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Aurora Project Intelligence Portal | Aurora Hub</title>
    <!-- Assets -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Libs -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>

    <div id="container">
        <div id="sidebar">
            <h2 style="color: #fff; margin: 0 0 40px 12px; font-weight: 600; letter-spacing: -0.5px; font-size: 1.4rem;">AURORA HUB</h2>
            <div id="nav-target">
                <!-- Group: Intelligence -->
                <div class="nav-group">Main Dashboard</div>
                <div id="nav-dashboard" class="nav-item active" onclick="switchDoc('dashboard', event)"><span>📊</span> Dashboard</div>
                
                <div class="nav-group">Governance & Context</div>
                <div id="nav-context" class="nav-item" onclick="switchDoc('context', event)"><span>🏛️</span> Team Context</div>
                
                <!-- Group: Execution -->
                <div class="nav-group">Execution Pillars</div>
                <div id="nav-01" class="nav-item" onclick="switchDoc('01', event)"><span>🎯</span> 01 Requirements</div>
                <div id="nav-02" class="nav-item" onclick="switchDoc('02', event)"><span>🗓️</span> 02 Planning & WBS</div>
                <div id="nav-03" class="nav-item" onclick="switchDoc('03', event)"><span>🛠️</span> 03 Implementation</div>
                <div id="nav-04" class="nav-item" onclick="switchDoc('04', event)"><span>🛡️</span> 04 Quality Gate</div>
                <div id="nav-05" class="nav-item" onclick="switchDoc('05', event)"><span>📦</span> 05 Delivery</div>
                <div id="nav-06" class="nav-item" onclick="switchDoc('06', event)"><span>⚖️</span> 06 Governance</div>
                <div id="nav-07" class="nav-item" onclick="switchDoc('07', event)"><span>📈</span> 07 Team Analytics</div>
            </div>
            
            <div style="margin-top: auto; padding: 20px 12px; font-size: 0.6rem; color: #484f58; border-top: 1px solid rgba(255,255,255,0.05);">
                <div style="margin-bottom: 4px;">SYSTEM PARTNER STANDARD</div>
                <div style="opacity: 0.5;">VIS-004 ARCHITECTURE REFORMED</div>
            </div>
        </div>

        <div id="main-scroll">
            <div class="content-card">
                <div id="view"></div>
            </div>
        </div>
    </div>

    <!-- Fullscreen Hyper-Gantt HUD -->
    <div id="fullscreen-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#02040a; z-index:2000; flex-direction:column; padding:0;">
        <div class="fs-top-bar">
            <div class="fs-title">AURORA HYPER-GANTT</div>
            <div class="fs-controls">
                <button id="btn-human" class="ctrl-btn active" onclick="window.setGanttMode('human')">CALENDAR</button>
                <button id="btn-ai" class="ctrl-btn" onclick="window.setGanttMode('ai')">AI HYPER</button>
            </div>
            <button onclick="window.closeFullscreen()" class="fs-btn" style="height:40px;">CLOSE</button>
        </div>
        
        <div class="fs-kpi-row">
            <!-- KPI Cards will be injected here -->
        </div>

        <div id="fs-gantt-scroll" style="flex:1; overflow: auto; padding: 0 50px 50px 50px;">
            <div id="fs-gantt-target" class="gantt-root"></div>
        </div>
    </div>

    <script>
        {{PROJECT_DATA_JSON}}

        function switchDoc(id, e) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const target = e ? e.currentTarget : document.getElementById('nav-' + id);
            if (target) {
                target.classList.add('active');
                document.getElementById('main-scroll').scrollTop = 0;
            }
            if (window.renderContent) window.renderContent(id);
        }
        window.switchDoc = switchDoc;
    </script>
    <script src="engine.js"></script>
</body>
</html>
